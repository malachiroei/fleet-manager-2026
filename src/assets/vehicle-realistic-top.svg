    <path d="M356 344c24-11 52-16 94-16s70 5 94 16c26 12 46 33 54 56 8 24 8 44 0 68-8 23-28 44-54 56-24 11-52 16-94 16s-70-5-94-16c-26-12-46-33-54-56-8-24-8-44 0-68 8-23 28-44 54-56Z" fill="url(#glass)"/>

    <path d="M380 139h140c24 0 43 19 43 43v88c0 24-19 43-43 43H380c-24 0-43-19-43-43v-88c0-24 19-43 43-43Z" fill="url(#glassReflection)"/>
    <path d="M380 359h140c24 0 43 19 43 43v74c0 24-19 43-43 43H380c-24 0-43-19-43-43v-74c0-24 19-43 43-43Z" fill="url(#glassReflection)" opacity="0.52"/>

    <path d="M313 226h-54c-17 0-31-14-31-31v-17c0-17 14-31 31-31h54c17 0 31 14 31 31v17c0 17-14 31-31 31Z" fill="#5f7997"/>
    <path d="M641 226h54c17 0 31-14 31-31v-17c0-17-14-31-31-31h-54c-17 0-31 14-31 31v17c0 17 14 31 31 31Z" fill="#5f7997"/>

    <path d="M313 356h-54c-17 0-31-14-31-31v-17c0-17 14-31 31-31h54c17 0 31 14 31 31v17c0 17-14 31-31 31Z" fill="#556e8b"/>
    <path d="M641 356h54c17 0 31-14 31-31v-17c0-17-14-31-31-31h-54c-17 0-31 14-31 31v17c0 17 14 31 31 31Z" fill="#556e8b"/>
  </g>

  <rect x="365" y="90" width="170" height="10" rx="5" fill="url(#tailLight)"/>
  <rect x="365" y="420" width="170" height="10" rx="5" fill="url(#tailLight)"/>
</svg>
