<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" role="img" aria-labelledby="title desc">
  <title id="title">Realistic Top Car</title>
  <desc id="desc">A realistic top-view vehicle illustration with metallic body and neon accents.</desc>
  <defs>
    <radialGradient id="shadowGlow" cx="50%" cy="56%" r="48%">
      <stop offset="0%" stop-color="#1dd3ff" stop-opacity="0.26"/>
      <stop offset="62%" stop-color="#0e3c63" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#000814" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bodyMain" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#f6fbff"/>
      <stop offset="30%" stop-color="#dbe8f8"/>
      <stop offset="60%" stop-color="#b8cbe3"/>
      <stop offset="100%" stop-color="#7f97b8"/>
    </linearGradient>
    <linearGradient id="bodyEdge" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#8ca6c3"/>
      <stop offset="50%" stop-color="#f3f9ff"/>
      <stop offset="100%" stop-color="#8ca6c3"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#1c3d5d"/>
      <stop offset="100%" stop-color="#0f2238"/>
    </linearGradient>
    <linearGradient id="glassReflection" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#88d7ff" stop-opacity="0.4"/>
      <stop offset="45%" stop-color="#88d7ff" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#88d7ff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="tailLight" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#0cc7ff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#0cc7ff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#0cc7ff" stop-opacity="0"/>
    </linearGradient>
    <filter id="softBlur" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <filter id="metalShadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="16" stdDeviation="16" flood-color="#020817" flood-opacity="0.52"/>
      <feDropShadow dx="0" dy="3" stdDeviation="2" flood-color="#d8ebff" flood-opacity="0.3"/>
    </filter>
  </defs>

  <ellipse cx="450" cy="285" rx="335" ry="175" fill="url(#shadowGlow)"/>
  <ellipse cx="450" cy="337" rx="310" ry="44" fill="#021125" opacity="0.52" filter="url(#softBlur)"/>

  <g filter="url(#metalShadow)">
