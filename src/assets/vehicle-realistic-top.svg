    <path d="M300 98c36-24 78-34 150-34s114 10 150 34c40 27 69 70 81 113 16 55 16 117 0 172-12 43-41 86-81 113-36 24-78 34-150 34s-114-10-150-34c-40-27-69-70-81-113-16-55-16-117 0-172 12-43 41-86 81-113Z" fill="none" stroke="url(#bodyEdge)" stroke-width="6" stroke-opacity="0.75"/>

